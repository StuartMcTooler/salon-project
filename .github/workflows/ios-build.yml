      #   with:
      #     name: app-ipa
      #     path: $RUNNER_TEMP/export/*.ipa

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ios/App/build/
            ~/Library/Logs/DiagnosticReports/
