version: 0.2

env:
  variables:
    ANDROID_HOME: "/root/.android/sdk"
    JAVA_HOME: "/usr/lib/jvm/java-21-amazon-corretto"
    GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.internal.http.socketTimeout=120000 -Dorg.gradle.internal.http.connectionTimeout=120000"

phases:
  install:
    runtime-versions:
      java: corretto21
      nodejs: 20
    commands:
      - echo "=== INSTALLING ANDROID COMMAND LINE TOOLS ==="
      - mkdir -p $ANDROID_HOME
      - wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
      - mkdir -p $ANDROID_HOME/cmdline-tools
      - unzip -q cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
      - mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
      - echo "=== INSTALL REQUIRED ANDROID SDK PACKAGES ==="
      - yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-35" "build-tools;35.0.0"

  pre_build:
    commands:
      - echo "=== INSTALL NODE DEPENDENCIES ==="
      - npm install --legacy-peer-deps
      
      - echo "=== VERIFY STRIPE TERMINAL PLUGIN INSTALLED ==="
      - ls -la node_modules/@capacitor-community/stripe-terminal/
      - cat node_modules/@capacitor-community/stripe-terminal/package.json | grep version
      
      - echo "=== BUILD WEB ASSETS ==="
      - npm run build
      
      - echo "=== ADD ANDROID PLATFORM ==="
      - if [ ! -d "android" ]; then npx cap add android; fi
      
      - echo "=== FIX ANDROID SDK VERSIONS FOR STRIPE TERMINAL ==="
      - sed -i "s/minSdkVersion = 23/minSdkVersion = 30/" android/variables.gradle
      - sed -i "s/compileSdkVersion = 34/compileSdkVersion = 35/" android/variables.gradle
      - sed -i "s/targetSdkVersion = 34/targetSdkVersion = 35/" android/variables.gradle
      
      - echo "=== ADD STRIPE TERMINAL PACKAGING OPTIONS ==="
      - sed -i '/^android {/a\    packagingOptions {\n        resources {\n            excludes += ["org/bouncycastle/x509/*"]\n        }\n    }' android/app/build.gradle
      
      - echo "=== ADD BLUETOOTH PERMISSIONS FOR STRIPE TERMINAL ==="
      - sed -i '/<\/manifest>/i\    <uses-permission android:name="android.permission.BLUETOOTH" />\n    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />\n    <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />' android/app/src/main/AndroidManifest.xml
      
      - echo "=== CAPACITOR SYNC ==="
      - npx cap sync android
      
      - echo "=== VERIFY PLUGIN WAS SYNCED ==="
      - echo "--- Checking settings.gradle for stripe-terminal ---"
      - cat android/settings.gradle
      - echo "--- Checking if stripe-terminal android folder exists ---"
      - ls -la node_modules/@capacitor-community/stripe-terminal/android/
      
      - echo "=== MANUALLY ADD STRIPE TERMINAL TO SETTINGS.GRADLE IF MISSING ==="
      - |
        if ! grep -q "stripe-terminal" android/settings.gradle; then
          echo "Stripe Terminal not found in settings.gradle - adding manually"
          echo "" >> android/settings.gradle
          echo "include ':capacitor-community-stripe-terminal'" >> android/settings.gradle
          echo "project(':capacitor-community-stripe-terminal').projectDir = new File('../node_modules/@capacitor-community/stripe-terminal/android')" >> android/settings.gradle
          cat android/settings.gradle
        else
          echo "Stripe Terminal already in settings.gradle"
        fi
      
      - echo "=== ADD STRIPE TERMINAL DEPENDENCY TO APP BUILD.GRADLE ==="
      - |
        if ! grep -q "capacitor-community-stripe-terminal" android/app/build.gradle; then
          echo "Adding stripe-terminal dependency to app/build.gradle"
          sed -i "/implementation project(':capacitor-android')/a\    implementation project(':capacitor-community-stripe-terminal')" android/app/build.gradle
        else
          echo "Stripe Terminal dependency already in app/build.gradle"
        fi
      
      - echo "=== VERIFY FINAL BUILD.GRADLE ==="
      - cat android/app/build.gradle | grep -A5 "dependencies {"
      
      - echo "=== PREPARE GRADLE ==="
      - cd android
      - chmod +x gradlew

  build:
    commands:
      - echo "=== CLEAN AND BUILD ANDROID PROJECT ==="
      - for i in 1 2 3; do ./gradlew clean && break || echo "Retry $i..." && sleep 30; done
      - echo "=== BUILDING DEBUG APK ==="
      - for i in 1 2 3; do ./gradlew assembleDebug --warning-mode all && break || echo "Retry $i..." && sleep 30; done
      - echo "=== BUILDING RELEASE APK & AAB ==="
      - ./gradlew assembleRelease --warning-mode all
      - ./gradlew bundleRelease --warning-mode all

  post_build:
    commands:
      - echo "=== CHANGE BACK TO ROOT DIRECTORY ==="
      - cd ..
      
      - echo "=== VERIFY APK FILES EXIST ==="
      - ls -la android/app/build/outputs/apk/debug/
      - ls -la android/app/build/outputs/apk/release/
      - ls -la android/app/build/outputs/bundle/release/
      
      - echo "=== CONFIGURE AWS CLI FOR SIGNATURE V4 ==="
      - aws configure set default.s3.signature_version s3v4
      
      - echo "=== UPLOADING APK/AAB TO S3 ==="
      - aws s3 cp android/app/build/outputs/apk/debug/app-debug.apk s3://my-android-builds-eu-west-1/myapkbuilds/app-debug.apk
      - aws s3 cp android/app/build/outputs/apk/release/app-release-unsigned.apk s3://my-android-builds-eu-west-1/myapkbuilds/app-release-unsigned.apk
      - aws s3 cp android/app/build/outputs/bundle/release/app-release.aab s3://my-android-builds-eu-west-1/myapkbuilds/app-release.aab

artifacts:
  files:
    - android/app/build/outputs/apk/debug/app-debug.apk
    - android/app/build/outputs/apk/release/app-release-unsigned.apk
    - android/app/build/outputs/bundle/release/app-release.aab
  discard-paths: yes
